<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.8;
            color: #2c3e50;
            background-color: #f8f9fa;
        }
        h1 {
            color: #1a73e8;
            border-bottom: 3px solid #1a73e8;
            padding-bottom: 10px;
        }
        a {
            color: #1a73e8;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .post-item {
            background: white;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
        .post-item a {
            font-size: 18px;
            font-weight: 500;
        }
        .post-date {
            color: #888;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>📝 欢迎来到我的个人博客</h1>
    <p>这是我的个人博客，使用纯 HTML + GitHub Pages 搭建。</p>

    <h2>📄 最新文章</h2>
    <div class="post-item">
        <a href="/my-blog/posts/first-post.html">我的第一篇博客</a>
        <span class="post-date">2026-07-07</span>
    </div>

    <hr>
    <p style="text-align:center; color:#aaa; font-size:14px;">
        © 2026 我的个人博客 · 由 GitHub Pages 托管
    </p>
